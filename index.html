    namePh:'उत्पाद का नाम (वैकल्पिक)', discPrice:'मूल्य', perUnit:'प्रति इकाई',
    tieText:'प्रति इकाई समान मूल्य',
    winnerText:'{name} सस्ता है', savePct:'{pct}% बचत',
    saveCash:'प्रति इकाई {amount} बचत',
    save:'सहेजें', reset:'↺ रीसेट', saveOk:'सहेजा ✓',
  },
  kk: {
    title:'Баға салыстыру', compare:'Салыстыру', history:'Тарих',
    productA:'Тауар A', productB:'Тауар B',
    pricePh:'Баға (сан)', qtyPh:'Мөлшер мыс: дана, г, мл',
    namePh:'Тауар атауы (міндетті емес)', discPrice:'Баға', perUnit:'бірлік үшін',
    tieText:'Бірлік бағасы бірдей',
    winnerText:'{name} арзанырақ', savePct:'{pct}% үнемдеу',
    saveCash:'бірлік үшін {amount} үнемдеу',
    save:'Сақтау', reset:'↺ Қалпына келтіру', saveOk:'Сақталды ✓',
  },
};

let locale = localStorage.getItem('locale') || 'th';
const t = (k, v={}) => {
  let s = (LANG[locale]||LANG.en)[k] || k;
  Object.entries(v).forEach(([a,b]) => s = s.replace(`{${a}}`, b));
  return s;
};

// ── State ─────────────────────────────────────────────────────────────────────
const S = {
  a: { price:'', qty:'', name:'', disc:'flat', dval:'' },
  b: { price:'', qty:'', name:'', disc:'flat', dval:'' },
};

// ── Compare logic ─────────────────────────────────────────────────────────────
function calcUnitPrice(side) {
  const p = parseFloat(S[side].price);
  const q = parseFloat(S[side].qty);
  if (!p || !q || p <= 0 || q <= 0) return null;
  const d = parseFloat(S[side].dval) || 0;
  const ep = S[side].disc === 'percent' ? p * (1 - Math.min(d,100)/100) : Math.max(0, p - d);
  return ep / q;
}

function runCompare() {
  const ua = calcUnitPrice('a');
  const ub = calcUnitPrice('b');
  if (ua === null || ub === null) return null;
  const diff = Math.abs(ua - ub);
  const max  = Math.max(ua, ub);
  const winner = diff < 1e-10 ? 'tie' : ua < ub ? 'a' : 'b';
  return { ua, ub, winner, pct: max > 0 ? (diff/max)*100 : 0, cash: diff };
}

// ── Render ────────────────────────────────────────────────────────────────────
const CARD_BASE  = 'flex-1 min-w-0 rounded-2xl border-2 p-3 bg-white transition-all duration-200 ';
const CARD_WIN   = CARD_BASE + 'border-green-500 shadow-lg shadow-green-100 ring-1 ring-green-300';
const CARD_TIE   = CARD_BASE + 'border-blue-400';
const CARD_NORM  = CARD_BASE + 'border-gray-200';
const RES_WIN    = 'text-center p-2 rounded-xl bg-green-50';
const RES_NORM   = 'text-center p-2 rounded-xl bg-gray-100';
const PRICE_WIN  = 'text-base font-bold tabular-nums text-green-600';
const PRICE_NORM = 'text-base font-bold tabular-nums text-gray-700';

let lastResult = null;

function render() {
  const r = runCompare();
  lastResult = r;

  ['a','b'].forEach(s => {
    document.getElementById(`card-${s}`).className = CARD_NORM;
    document.getElementById(`badge-${s}`).className = 'hidden text-xs font-bold px-2 py-0.5 rounded-full bg-green-500 text-white animate-pulse';
    document.getElementById(`res-${s}`).classList.add('hidden');
    document.getElementById(`up-${s}`).className = PRICE_NORM;
  });

  document.getElementById('banner').classList.add('hidden');
  document.getElementById('tips').classList.remove('hidden');

  if (!r) return;

  // Show per-unit prices
  ['a','b'].forEach(s => {
    const up = s === 'a' ? r.ua : r.ub;
    document.getElementById(`res-${s}`).classList.remove('hidden');
    document.getElementById(`up-${s}`).textContent = up.toFixed(2);
  });

  // Winner highlight
  if (r.winner === 'tie') {
    document.getElementById('card-a').className = CARD_TIE;
    document.getElementById('card-b').className = CARD_TIE;
  } else {
    const w = r.winner;
    document.getElementById(`card-${w}`).className = CARD_WIN;
    document.getElementById(`badge-${w}`).className = 'text-xs font-bold px-2 py-0.5 rounded-full bg-green-500 text-white animate-pulse';
    document.getElementById(`res-${w}`).className = RES_WIN;
    document.getElementById(`up-${w}`).className = PRICE_WIN;
    document.getElementById(`res-${w === 'a' ? 'b' : 'a'}`).className = RES_NORM;
  }

  // Banner
  const nameA = S.a.name || t('productA');
  const nameB = S.b.name || t('productB');
  const wnName = r.winner === 'a' ? nameA : r.winner === 'b' ? nameB : null;

  document.getElementById('banner').classList.remove('hidden');
  document.getElementById('tips').classList.add('hidden');

  if (r.winner === 'tie') {
    document.getElementById('b-emoji').textContent = '🤝';
    document.getElementById('b-title').textContent = t('tieText');
    document.getElementById('b-title').className = 'text-xl font-bold text-gray-600';
    document.getElementById('b-sub').textContent = '';
  } else {
    document.getElementById('b-emoji').textContent = '🏆';
    document.getElementById('b-title').textContent = t('winnerText', { name: wnName });
    document.getElementById('b-title').className = 'text-xl font-bold text-green-600';
    document.getElementById('b-sub').textContent =
      t('savePct',{ pct: r.pct.toFixed(1) }) + '  ·  ' +
      t('saveCash',{ amount: r.cash.toFixed(2) });
  }

  // Banner cards
  document.getElementById('bname-a').textContent  = nameA;
  document.getElementById('bname-b').textContent  = nameB;
  document.getElementById('bprice-a').textContent = r.ua.toFixed(2) + ' ' + t('perUnit');
  document.getElementById('bprice-b').textContent = r.ub.toFixed(2) + ' ' + t('perUnit');

  ['a','b'].forEach(s => {
    const isW = r.winner === s;
    document.getElementById(`bcard-${s}`).className =
      isW ? 'rounded-xl p-3 text-center bg-green-50 border border-green-200'
          : 'rounded-xl p-3 text-center bg-gray-50';
    document.getElementById(`bprice-${s}`).className =
      isW ? 'font-bold tabular-nums text-green-600 text-sm'
          : 'font-bold tabular-nums text-gray-500 text-sm';
  });
}

// ── Discount type toggle ──────────────────────────────────────────────────────
function setDisc(side, type) {
  S[side].disc = type;
  document.getElementById(`pct-${side}`).className  = (type === 'percent' ? ON : OFF);
  document.getElementById(`flat-${side}`).className = (type === 'flat'    ? ON : OFF);
  render();
}

// ── Save to history ───────────────────────────────────────────────────────────
function saveHistory() {
  if (!lastResult) return;
  const hist = JSON.parse(localStorage.getItem('gc_history') || '[]');
  hist.unshift({
    id:   Date.now(),
    date: new Date().toISOString(),
    a: { ...S.a }, b: { ...S.b },
    ua: lastResult.ua, ub: lastResult.ub, winner: lastResult.winner,
  });
  localStorage.setItem('gc_history', JSON.stringify(hist.slice(0, 200)));
  const btn = document.getElementById('save-btn');
  const orig = btn.textContent;
  btn.textContent = t('saveOk');
  btn.classList.replace('bg-green-500','bg-blue-500');
  btn.classList.replace('hover:bg-green-600','hover:bg-blue-600');
  setTimeout(() => {
    btn.textContent = t('save');
    btn.classList.replace('bg-blue-500','bg-green-500');
    btn.classList.replace('hover:bg-blue-600','hover:bg-green-600');
  }, 2000);
}

// ── Reset ─────────────────────────────────────────────────────────────────────
document.getElementById('reset-btn').addEventListener('click', () => {
  ['a','b'].forEach(s => {
    S[s] = { price:'', qty:'', name:'', disc:'flat', dval:'' };
    ['price','qty','name','dval'].forEach(f => {
      const el = document.getElementById(`${f === 'dval' ? 'dval' : f}-${s}`);
      if (el) el.value = '';
    });
    setDisc(s, 'flat');
  });
  render();
});

// ── Input listeners ───────────────────────────────────────────────────────────
['a','b'].forEach(s => {
  document.getElementById(`price-${s}`).addEventListener('input', e => { S[s].price = e.target.value; render(); });
  document.getElementById(`qty-${s}`).addEventListener('input',   e => { S[s].qty   = e.target.value; render(); });
  document.getElementById(`name-${s}`).addEventListener('input',  e => { S[s].name  = e.target.value; render(); });
  document.getElementById(`dval-${s}`).addEventListener('input',  e => { S[s].dval  = e.target.value; render(); });
});

// ── Language ──────────────────────────────────────────────────────────────────
function applyLang() {
  document.documentElement.lang = locale;
  document.getElementById('lang-select').value = locale;
  document.querySelectorAll('[data-i18n]').forEach(el => {
    el.textContent = t(el.dataset.i18n);
  });
  document.querySelectorAll('[data-ph]').forEach(el => {
    el.placeholder = t(el.dataset.ph);
  });
  render();
}

document.getElementById('lang-select').addEventListener('change', e => {
  locale = e.target.value;
  localStorage.setItem('locale', locale);
  applyLang();
});

// ── Init ──────────────────────────────────────────────────────────────────────
setDisc('a', S.a.disc);
setDisc('b', S.b.disc);
applyLang();
</script>
</body>
</html>
